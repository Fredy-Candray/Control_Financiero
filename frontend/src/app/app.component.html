<div class="app-shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">
        <img src="assets/frs.jpg" alt="Logo Control Financiero" />
      </div>
      <div class="brand-text">
        <h2>Control Financiero</h2>
        <p>Gestión de finanzas</p>
      </div>
    </div>

    <nav class="nav-links">
      <a routerLink="/dashboard" routerLinkActive="active" title="Dashboard">
        <span>📊</span>
        <span class="nav-label">Dashboard</span>
      </a>
      <a routerLink="/cuentas" routerLinkActive="active" title="Cuentas">
        <span>🏦</span>
        <span class="nav-label">Cuentas</span>
      </a>
      <a routerLink="/movimientos" routerLinkActive="active" title="Movimientos">
        <span>💳</span>
        <span class="nav-label">Movimientos</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="theme-btn" (click)="toggleTheme()" [attr.aria-pressed]="isDark()" title="Alternar tema">
        <svg *ngIf="isDark()" class="icon icon-moon" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
          <path fill="currentColor" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
        <svg *ngIf="!isDark()" class="icon icon-sun" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
          <circle cx="12" cy="12" r="4" fill="currentColor" />
          <g stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.2" y1="4.2" x2="5.6" y2="5.6" />
            <line x1="18.4" y1="18.4" x2="19.8" y2="19.8" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.2" y1="19.8" x2="5.6" y2="18.4" />
            <line x1="18.4" y1="5.6" x2="19.8" y2="4.2" />
          </g>
        </svg>
      </button>
    </div>
  </aside>

  <div class="content-area">
    <header class="topbar" *ngIf="showTopbar">
      <div class="user-menu">
        <div class="user-pill" (click)="toggleUserMenu()" role="button" tabindex="0" (keydown.enter)="toggleUserMenu()" (keydown.space)="toggleUserMenu()">
          <span class="avatar">{{ username.charAt(0).toUpperCase() }}</span>
          <span>{{ username }}</span>
          <span class="user-menu-arrow">▾</span>
        </div>
        <div class="user-menu-dropdown" *ngIf="showUserMenu">
          <button type="button" class="logout-btn" (click)="logout()">Cerrar sesión</button>
        </div>
      </div>
    </header>

    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
